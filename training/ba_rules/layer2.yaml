  - rule_id: L2.RIGHTSIZE.MEMORY.001
    topic: "Memory rightsizing per R&D.SLIDE8 with strategy-driven branch selection"
    ba_action: |
      Apply the R&D-sanctioned memory rightsizing PER VM, driven by
      KP.STRATEGY_PRECEDENCE:

        strategy == 'per_vm_telemetry'  AND  vMemory[Consumed] present:
          rs_mem_gib = snapMem( max( min_mem_gib,
                                       (vMemory[Consumed] / 1024)
                                         × (1 + mem_buffer_pct/100) ) )
          (R&D.SLIDE8.MEMORY.DEFAULT — buffer defaults to 0)

        strategy == 'flat_reduction':
          rs_mem_gib = snapMem( max( min_mem_gib,
                                       (vInfo[Memory] / 1024)
                                         × (1 − mem_reduction_pct/100)
                                         × (1 + mem_buffer_pct/100) ) )
          (R&D.SLIDE8.MEMORY.USER with BA-supplied parameters)

        strategy == 'like_for_like':
          rs_mem_gib = snapMem( max( min_mem_gib, vInfo[Memory] / 1024 ) )
          (R&D.SLIDE8.MEMORY.USER with mem_reduction_pct=0, buffer=0.
           Customer A reference baseline used this strategy.)

        strategy == 'ba_fallback':
          rs_mem_gib = snapMem( max( min_mem_gib,
                                       (vInfo[Memory] / 1024) × 0.60 ) )
          (R&D.SLIDE8.MEMORY.USER with mem_reduction_pct = 40 per
           KP.BA_FALLBACK_REDUCTIONS, buffer = 0. BA-editable.)

        strategy == 'host_proxy':
          (Memory does NOT use host proxy in the R&D deck. When
           utilisation_strategy='host_proxy' is selected for CPU, memory
           defaults to like_for_like unless BA specifies otherwise.)

      `min_mem_gib` proposed at 1 GiB (snapMem floor governs at 4 GiB).
      `snapMem` ladder per R&D.SLIDE8.SNAPMEM.
    inputs:
      - "vInfo[Memory] (raw MiB) for sizing"
      - "VMRecord.mem_util_pct (when vMemory tab present)"
      - "ba_review_packet.utilisation_strategy, mem_reduction_pct, mem_buffer_pct"
