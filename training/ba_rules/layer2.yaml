# =============================================================================
# BV Benchmark — Layer 2 BA Rule Book
# =============================================================================
#
# Layer scope : Per-VM Azure SKU least-cost matching, with rightsizing across
#               CPU / Memory / Storage and pricing offers (PAYG, RI-1y, RI-3y,
#               SP-1y, SP-3y).
#
# Authoritative sources (DUAL-CITATION REQUIRED):
#   1. Microsoft Azure R&D — "VMware/OnPrem to Azure Mappings" deck.
#      Verbatim formulas captured at:
#        training/baseline_workflow/azure_rd_rightsizing/canonical_formulas.md
#      Anchors used: R&D.SLIDE7.CPU.*, R&D.SLIDE8.MEMORY.*, R&D.SLIDE9.STORAGE.*
#      Adopted 2026-04-27 because the colleague's R&D-sanctioned formulas
#      are defensible and replace the BA's previous static "made-up" reduction
#      factors.
#   2. BA Layer 2 transcript:
#        training/baseline_workflow/layer2_azure_match/transcript.vtt
#      Cited by [HH:MM:SS] timestamp + verbatim excerpt.
#
# Every rule below must cite BOTH sources where applicable. When the two
# sources conflict, the conflict is recorded explicitly under
# `source_conflict` and resolved in `resolution`. Examples in this draft:
#   - L2.RIGHTSIZE.CPU.WINDOWS_FLOOR  (BA-specific carve-out absent from R&D)
#   - L2.RIGHTSIZE.STORAGE.MULTI_DISK (BA's per-disk decomposition vs single sum)
#
# Schema   : same as ../README.md (rule book schema).
# Status   : MATCH | PARTIAL | DELTA | UNIMPLEMENTED | NA
# =============================================================================

layer: 2
title: "Per-VM Azure SKU least-cost matching with R&D-sanctioned rightsizing"
recording_length_min: 30
ba_signoff:
  reviewed: true
  reviewer: "Ozzie Diaz (BA)"
  date: "2026-04-27"
  notes: |
    Initial Layer 2 review pass. BA-confirmed clarifications captured:
    - Strategy enum extended: per_vm_telemetry, host_proxy, flat_reduction,
      like_for_like, ba_fallback. Selection precedence + Customer A-historical
      strategy documented in KP.STRATEGY_PRECEDENCE.
    - 8-vCPU floor flag DEFAULTS TO FALSE (BA's preferred posture is to
      get the strongest defensible business case; floor is opt-in via the
      L1 review packet so the BA can show the customer both with and
      without strict licensing enforcement).
    - Last-ditch "Ozzie's guess" reduction defaults codified in
      KP.BA_FALLBACK_REDUCTIONS — cpu=60% reduction (40% retained),
      mem=40% reduction (60% retained), storage=20% reduction (80%
      retained). Editable per engagement.

# =============================================================================
# KEY PRINCIPLES — apply to every rule below; precedence over any one rule.
# =============================================================================
key_principles:

  - id: KP.PER_VM_REPRISE
    title: "Layer 2 inherits Layer 1's PER-VM principle"
    statement: |
      Per L1.KP.PER_VM, all sizing and pricing decisions in Layer 2 are made
      PER VM and SUMMED. Fleet aggregates are FYI only and never used as a
      sizing or pricing input.
    enforcement: |
      Layer 2 input is per_vm[] from Layer 1. Output is per_vm_l2[] with
      (sku_name, vcpu, memory_gib, disk_gib, payg_usd_yr, ri1y_usd_yr,
      ri3y_usd_yr, sp1y_usd_yr, sp3y_usd_yr, family, processor, region).
    citations:
      - source: "BA Layer 2 transcript"
        timestamp: "00:04:49"
        excerpt: "we are doing per VM pricing and summing up the Azure consumption revenue. We are not doing fleet wide because that is too imprecise."

  - id: KP.AZURE_RD_RIGHTSIZING_v1
    title: "Adopt R&D-sanctioned canonical rightsizing formulas verbatim"
    statement: |
      All CPU, Memory and Storage rightsizing math follows the Microsoft
      Azure R&D "VMware/OnPrem to Azure Mappings" deck (anchors
      R&D.SLIDE7.*, R&D.SLIDE8.*, R&D.SLIDE9.*). BA-specific carve-outs are
      additive guards on top of the R&D formulas, never replacements. Every
      affected rule cites both the R&D anchor and the BA transcript.
    enforcement: |
      Layer 2 replica implements the formulas as named functions
      (`rd_slide7_cpu_default`, `rd_slide7_cpu_user`, …) so the source-of-
      truth is one-to-one with the canonical document.
    citations:
      - source: "User instruction to engineering"
        date: "2026-04-27"
        excerpt: "my colleague's implemention (she's in R&D) is defensible vs the fallback 'reduction factor' static numbers I had originally are made up. let's ensure to annotate everywhere we are following the R&D-sanctioned rightsizing calculation."

  - id: KP.HOSTPROXY_GATE
    title: "R&D's CPU default uses host-proxy — gate behind BA approval"
    statement: |
      R&D.SLIDE7.CPU.DEFAULT multiplies vInfo[CPUs] by vHost[CPU Usage %]
      with a `max(…, 1)` floor. This is exactly the path our engine
      disabled in v1.3.0 M1 (it produced 836 over-sized SKU matches in the
      Customer A sample due to noisy-neighbour distortion and zero-host% collapse
      to min_vcpus). Per L1.UTIL.005 BA-clarified: the host-proxy path is
      OFFERED to the BA in the L1 review packet and only applied if the BA
      explicitly accepts.
    enforcement: |
      Layer 2 reads `ba_review_packet.utilisation_strategy` set in Layer 1.
      Possible values: 'host_proxy' | 'flat_reduction' | 'per_vm_telemetry'.
      The R&D.SLIDE7.CPU.DEFAULT formula is run only when strategy ==
      'host_proxy'. Otherwise R&D.SLIDE7.CPU.USER is run with the BA-approved
      cpu_reduction_pct (from the L1 packet's proposed_reduction_factors).

  - id: KP.WIN_8VCPU_MIN
    title: "8-vCPU minimum applies ONLY to Windows Server VMs (option flag)"
    statement: |
      Microsoft licensing technically requires a minimum of 8 vCPUs for any
      Azure VM running Windows Server. BAs do not always enforce this when
      pursuing a strong positive ROI (per BA practice 2026-04-27 — the
      original engine `min_vcpu = 8` floor in azure_sku_matcher applied to
      ALL VMs was too aggressive). The Layer 2 pipeline exposes a flag:

          enforce_8vcpu_min_for_windows_server: bool   (default: True)

      Semantics:
        - When True AND the VM's OS contains "Windows Server"
          (case-insensitive, matched in either vInfo OS Config or vInfo OS
          Tools column): apply min_vcpus = 8 in the rightsizing formulas.
        - When True AND the VM's OS is anything else, missing, or empty:
          treat as Linux, apply min_vcpus = 1 (no floor beyond the snapCPU
          ladder's lowest rung).
        - When False: apply min_vcpus = 1 to ALL VMs regardless of OS.
      The decision is recorded per-VM as `vcpu_floor_source`:
      'windows_compliance' | 'linux_or_unknown' | 'flag_off'.
    enforcement: |
      Layer 2 replica reads each VMRecord.os_config and os_tools, applies
      the same Windows pattern as engine/rvtools_parser._WINDOWS_PATTERN
      (re.compile(r"windows\\s+server", re.IGNORECASE)). BA can flip the
      flag in the L1 review packet before Layer 2 runs.
    citations:
      - source: "User instruction to engineering"
        date: "2026-04-27"
        excerpt: "the '8-vcpu minimum' that technically ONLY applies to on-premise customer VMs that are running Windows Server. ... we need to incorporate an option flag that states 'Enforce 8-vcpu minimum for all Windows Server VMs'. if there is no OS or any non-Windows Server OS is listed for a VM, then that assumes Linux and we can go as low as need be"

  - id: KP.UNITS_BINARY_FOR_SIZING
    title: "Layer 2 sizing math uses BINARY (GiB); pricing math uses DECIMAL (GB)"
    statement: |
      Azure VM/disk catalogue tiers are published in binary GiB (memory)
      and binary GiB (P-series disks). The R&D formulas convert MiB → GiB
      via `/1024`. This DIFFERS from L1.KP.MIB_DEFAULT (`/953.674`) which
      targets the Azure Retail Pricing API's decimal-GB convention.

      Both are correct in their domain:
        Layer 2 sizing  → /1024  (binary, matches catalogue tier shape)
        Layer 1/3 TCO   → /953.674  (decimal, matches pricing API)
    enforcement: |
      Layer 2 replica reads VMRecord.memory_gb_decimal (L1 output, decimal)
      ONLY for FYI display. For sizing it re-reads vInfo[Memory] MiB raw and
      converts /1024. This avoids accumulated rounding drift across layers.

  - id: KP.LEAST_COST_BIZ_CASE
    title: "Business case = least-cost reasonable Azure SKUs (NOT solution architecture)"
    statement: |
      The BV Benchmark Business Case is a business-case + TCO model, not a
      production solution architecture. The BA's SKU and disk choices
      reflect a 'reasonable and functional' default for Azure cost
      modelling — not workload-tuned, not performance-engineered.

      The BA does NOT have a hardcoded family bias. The 76% D / 22% E /
      2% F-FX / 0.15% HB distribution observed in Customer A's Xa2-fixed
      tab is an OUTPUT of cheapest-fit selection across the full Azure
      catalog, not a curated input pool.

      The replica's matcher pool is the FULL live Azure VM catalog (all
      D/E/F/FX/M/H families, all sizes) MINUS three small exclusion sets:

        VM SKU exclusions (BA-confirmed via Customer A audit):
          ❌ ARM-Cobalt (Standard_[DEF]Npls_v6, Standard_[DEF]Nps_v6,
             Standard_[DEF]Npds_v7) — Linux-only; 0 BA picks.
          ❌ Confidential Compute (Standard_DC*, Standard_EC*) —
             specialised; 0 BA picks.
          ❌ Spot / Low-Priority — not durable production capacity;
             excluded by API fetcher.
          ❌ Legacy versions v2/v3/v4 EXCEPT for families that only exist
             in those versions: FX-only-v2 (Standard_FX*ms_v2), M-only-v3
             (Standard_M96s_2_v3), HB-only-v4 (Standard_HB176rs_v4).
             Customer A audit: 0 picks of legacy v2/v3/v4 from the
             excluded families.

        Storage tier default:
          ✅ Standard SSD LRS (E-series tiers: E1…E80) — BA default
             because business case targets least-cost storage that's
             still production-class.
          ⚠️ Premium SSD LRS (P-series) is OPT-IN for workloads where the
             BA explicitly requires the higher IOPS/throughput tier.
          ❌ GRS / RA-GRS / ZRS — over-provisioned for a base business
             case. Available as opt-in.

        Tie-break rule: when two SKUs share the cheapest PAYG, prefer the
          one with the HIGHER version (v7 > v6 > v5). Matches BA's XA2
          picks where AMD-lite v7 wins over v5/v6 at identical price.

        Reservation defaults:
          PAYG is the headline; RI-1y, RI-3y, SP-1y, SP-3y shown side-by-
          side per L2.PRICING.001 so the BA can show the customer the
          full discount tier ladder.
    enforcement: |
      The replica's matcher exposes a 3-algorithm ``--matcher-algorithm`` flag:
        - ``ba_iterative_match``: apply the IN/OUT pool above,
          then cheapest PAYG ≥ (vcpu, mem). When XA2 returns no match,
          decrement vCPU 1-by-1 (down to floor), then increment memory 1
          GiB at a time. Source values are NOT pre-snapped — the matcher's
          ``>=`` test handles the ladder. Captures BA's manual adjustments
          (transcript 00:05:49 / 00:08:09 / 00:11:29 / 00:12:07).
        - ``ba_xa2_match`` (recommended): mirrors BA's XA2 spreadsheet
          behavior — pre-snap source vCPU and memory to the Azure ladder
          (R&D.SLIDE7.SNAPCPU, R&D.SLIDE8.SNAPMEM) FIRST, then run the same
          decrement-vCPU / increment-mem bump loop. BA-confirmed 28 Apr
          2026 that this is what XA2 actually does. Best parity vs
          BA Xa2-fixed (98.2% exact-SKU match on Customer A).
        - ``rd_rightsized``: deprecated alias for ``ba_xa2_match``. Kept
          for backward compatibility; resolves to the same code path.
        - ``pure_least_cost_no_arm``: diagnostic only; same exclusions,
          no iterative adjustment loop, with vCPU/memory over-spec
          ceilings (default 2.0× / 3.0×) to prevent absurd
          over-provisioning. Useful as an absolute price floor.
      Disk picker exposes ``--disk-class`` choice ('Standard'|'Premium').
    citations:
      - source: "User instruction (Customer A Q&A)"
        date: "2026-04-27"
        excerpt: "the BA is trying to develop a business case that has the best ROI. it is NOT a solution architecture! we're always looking for the reasonable and functional ... SKU across VMs and storage to get the best least-cost Azure options"
      - source: "User clarification (Xa2-fixed audit)"
        date: "2026-04-27"
        excerpt: "the BA does not fixate on specific sku families, but rather lowest reasonably priced VM that matches. the challenge comes in when Xa2 function does not match and we have to adjust the cpu up or down ... or memory up or down"
      - source: "BA Layer 2 transcript"
        timestamp: "00:19:30"
        excerpt: "the configuration default is LRS. We don't need GRS or any of that"

  - id: KP.BA_ITERATIVE_MATCH
    title: "BA matching mental model: XA2 + 1-by-1 integer adjustments"
    statement: |
      The BA's per-VM SKU picker is XA2 GETVM3 with a small interactive
      adjustment loop when XA2 returns #VALUE! (no match). Verbatim from
      Layer 2 transcript:

        Step 1 (transcript 00:05:10): single XA2 lookup with raw
          (vinfo[CPUs], vinfo[Memory_GB]). XA2 returns the cheapest Azure
          SKU with vcpu ≥ target AND memory_gib ≥ target.

        Step 2 (00:05:49, 00:08:09, 00:11:29): 'I adjusted them down,
          basically one by one. one vCPU at a time until I got a
          successful match.' DECREMENT vCPU input by 1 INTEGER per try
          (NOT by ladder rung). XA2 still returns ladder-rung SKUs because
          it tests vcpu ≥ target — e.g. asking for 13 vCPU on D-family
          (rungs 8, 16) returns D16 because 16 ≥ 13.

        Step 3 (00:12:07): 'I started incrementing on a one GB basis until
          I got the first least cost Azure virtual machine match.' If
          vCPU floor reached, INCREMENT memory by 1 GiB.

        Step 4 (BA-implied): bias AGAINST memory increment (00:06:49: 'we
          would end up over inflating'). Cap default 16 GiB; BA-tunable.

      BA-overridable knobs (defaults match BA's typical workflow):
        vcpu_decrement_floor     = 1        (don't go below 1 vCPU)
        vcpu_decrement_max_steps = 4        (stay close to original)
        mem_increment_cap_gib    = 16       (don't bloat memory)
    enforcement: |
      ``match_with_retry()`` in training/replicas/layer2_ba_replica.py
      implements the 4-step loop verbatim, with knobs exposed in the L1
      review packet for per-engagement override.
    citations:
      - source: "User clarification"
        date: "2026-04-27"
        excerpt: "yes, the ladder rung interpretation is an oversimplification of what appears to be a more regimented approach by R&D formulas. the reason for the '1 by 1' is to ensure that once we hit a match with Xa2 function, then we stop. also, one way that Xa2 functions is that an adjusted cpu count =3 can still match to a D4 or some other 4-core vm sku"
      - source: "BA Layer 2 transcript"
        timestamp: "00:05:49"
        excerpt: "I adjusted them down, basically one by one. one vCPU at a time until I got a successful match"
      - source: "BA Layer 2 transcript"
        timestamp: "00:12:07"
        excerpt: "I started incrementing on a one GB basis until I got the first least cost Azure virtual machine match"

  - id: KP.LIVE_PRICING_API
    title: "Pricing is LIVE Azure Retail Prices API — not a snapshot"
    statement: |
      The BA's XA2 add-in (Excel) and the replica's pricing module BOTH
      call the live Azure Retail Prices API at
      https://prices.azure.com/api/retail/prices in real time. There is
      NO baked-in price list, NO snapshot, NO historical data file.

      Verified 2026-04-27 by spot-checking 8 of BA's most-frequent
      Customer A SKU picks against today's API: 8/8 matched at 0.00%
      delta on PAYG hourly. Remaining replica-vs-BA variance comes from
      SKU SHAPE selection, not price drift.
    enforcement: |
      training/replicas/azure_pricing.py uses urllib only (no SDK), 24h
      cache lives at .cache/azure_prices_l2/ (gitignored). Cache files
      are NEVER written empty (poison-cache guard).
    citations:
      - source: "BA Layer 2 transcript"
        timestamp: "00:07:33"
        excerpt: "the XA2 functions look up through the same Azure Retail Price API that you will use"
      - source: "Replica spot-check verification"
        date: "2026-04-27"
        evidence: "8/8 SKUs matched 0.00% delta vs live API: D2als_v7, D4as_v5, D4als_v7, E4as_v5, D8as_v5, D2as_v5, D8als_v7, D16als_v7"

  - id: KP.PRICING_OFFER_MATRIX
    title: "Five pricing offers per VM: PAYG, RI-1y, RI-3y, SP-1y, SP-3y"
    statement: |
      For every successfully matched SKU the pipeline must report PAYG plus
      Reserved Instance (1-year, 3-year) and Savings Plan (1-year, 3-year)
      prices when each is available from the Azure Retail Price API. Some
      SKUs do not offer all five; missing offers are flagged not faked.
    enforcement: |
      per_vm_l2[].pricing is dict[offer_code -> {usd_yr, source, available}].
      Aggregate Azure consumption revenue is the sum across per-VM PAYG
      values for the headline number, with the four reserved/savings totals
      shown alongside.
    citations:
      - source: "BA Layer 2 transcript"
        timestamp: "00:04:07"
        excerpt: "The reserved instance, 3 year. The savings plan, one year, the savings plan, three year, if available. Sometimes for different VM SKUs on Azure, not all of the pricing offers are available uniformly. So you just have to annotate, provide warnings or errors when some are missing"

  - id: KP.BA_SMALL_VM_FLOOR
    title: "BA judgment overlay: pad undersized source VMs before sizing"
    statement: |
      Independent of the R&D slides, the BA's Customer A 2024-10 Xa2-fixed
      authoritative output applies a minimum (vCPU, memory_GiB) floor to
      undersized source VMs before SKU matching. Empirically observed:
      ~325 VMs with source (1 vCPU, <1 GiB) were padded to (2 vCPU, 2 GiB)
      and matched to Standard_D2als_v7 instead of Standard_F1als_v7.
      This is BA judgment (not in any R&D slide), exposed as an OPT-IN flag.
    enforcement: |
      Layer 2 replica accepts two optional kwargs:
        ba_min_vcpu_floor: int | None      (None == OFF)
        ba_min_memory_gib_floor: int | None (None == OFF)
      When set, the rightsizing math operates on
      effective_source = (max(raw_vcpu, floor_vcpu),
                          max(raw_mem_mib, floor_mem_gib*1024)).
      Per-VM record annotates ba_floor_applied=True when triggered, and the
      cpu_branch/memory_branch tags receive a "+ba_small_vm_floor" suffix.
      Default is OFF. Customer A baseline expects 2/2.
    citations:
      - source: "Customer A 2024-10 Xa2-fixed audit"
        date: "2026-04-28"
        excerpt: "BA padded all (1 vCPU, <1 GiB) VMs to (2 vCPU, 2 GiB) → D2als_v7"
      - source: "User instruction"
        date: "2026-04-28"
        excerpt: "all these options we'd ultimately want to render and annotate the cited logic for each option to BA before the BA approves layer 2 and goes to layer 3"

  - id: KP.BA_APPROVAL_GATE
    title: "Render + cite every Layer 2 decision for BA approval"
    statement: |
      Before the app transitions Layer 2 → Layer 3, the BA reviews a
      structured payload with every right-sizing decision, its R&D-slide
      anchor (or BA-judgment overlay), and the resulting per-VM SKU + ACR
      across all 5 pricing offers. The BA approves explicitly; the app
      records the approver name and timestamp.
    enforcement: |
      training/replicas/layer2_ba_approval.py exposes:
        BRANCH_CITATIONS    — branch_tag → R&D anchor + slide + formula
        BA_FLOOR_CITATION   — KP.BA_SMALL_VM_FLOOR overlay citation
        cite_branch(tag)    — decompose '+'-suffixed tags into a citation list
        build_per_vm_annotation(VMRecordL2) -> dict
        build_ba_approval_payload(Layer2Result, run_meta=…) -> dict
      app/pages/ba_approval.py renders the payload as a Streamlit page (Step 2.5).
    citations:
      - source: "User instruction"
        date: "2026-04-28"
        excerpt: "render and annotate the cited logic for each option to BA before the BA approves layer 2 and goes to layer 3 in the app"

  - id: KP.LINUX_AHUB_ASSUMPTION
    title: "Always price Azure VMs at the Linux rate (Azure Hybrid Benefit)"
    statement: |
      ALL Azure VM compute pricing in Layer 2 (PAYG, RI 1y, RI 3y, SP 1y,
      SP 3y) is fetched at the Linux rate, NEVER at the Windows-bundled
      rate. Rationale: customers are assumed to bring their existing
      Windows Server licenses via Azure Hybrid Use Benefit (AHUB), so
      Windows licensing cost MUST NOT be included in the business case
      ACR. This applies regardless of source-VM OS.
    enforcement: |
      training/replicas/azure_pricing.py L508-510 filters out any
      Azure Retail Prices API row whose ``productName`` contains
      'Windows'. The remaining rows are either explicitly Linux
      ('Series Linux') or OS-agnostic compute pricing (no OS suffix,
      i.e., the AHUB Linux rate). Rows with skuName containing 'Spot'
      or 'Low Priority' are also filtered.

      VERIFICATION (2026-04-28 against BA Customer A Xa2-fixed):
        - Standard_D2als_v7   BA $0.0804/hr  =  catalog $0.0804/hr ✓
        - Standard_D4als_v7   BA $0.161/hr   =  catalog $0.161/hr  ✓
        - Standard_D4as_v5    BA $0.172/hr   =  catalog $0.172/hr  ✓
        - Standard_M96s_2_v3  BA $12.45/hr   =  catalog $12.45/hr  ✓ (vm1016)
    citations:
      - source: "User instruction"
        date: "2026-04-28"
        excerpt: "BA ALWAYS picks Linux because we automatically assume the customer will use AHUB. We NEVER include Windows licensing cost in the Azure pricing! RULE!!"

# =============================================================================
# Section A — INPUT SCOPE
# =============================================================================

rules:

  - rule_id: L2.SCOPE.001
    topic: "Layer 2 operates on POWERED-ON VMs only"
    ba_action: |
      Only powered-on VMs from Layer 1's per_vm[] are considered for Azure
      VM least-cost matching. Powered-off VMs and templates are ignored at
      Layer 2 (they remain in Layer 1's TCO baseline).
    inputs:
      - layer1: "per_vm[] where is_powered_on == True AND is_template == False"
    output:
      engine_field: "per_vm_l2[] indexed by VM name"
      excel_cell: "(used in Consumption Plan Wk1 tab)"
    fallbacks: []
    citations:
      - source: "BA Layer 2 transcript"
        timestamp: "00:01:37"
        excerpt: "We only want to do the powered on VMs for the Azure VM least cost matching that will then sum up to the Azure consumption revenue."
      - source: "BA Layer 2 transcript"
        timestamp: "00:13:11"
        excerpt: "again, it is only for powered on VMs. You see that here, powered on VMs for calculating the Azure consumption revenue."
    reference_expected: 2661
    engine_status: MATCH
    engine_status_note: "Engine's vm_records[] already contains only powered-on, non-template VMs."
    reviewed: true

  - rule_id: L2.SCOPE.002
    topic: "Memory must be in decimal GB before Azure Retail Price API lookup"
    ba_action: |
      Convert vInfo[Memory] from MiB to GB BEFORE any Azure pricing call.
      For Layer 2 sizing math use binary GiB (/1024) per KP.UNITS_BINARY_FOR_SIZING;
      for pricing-API line items use decimal GB (/953.674) per L1.KP.MIB_DEFAULT.
      Both conversions live inside Layer 2; do not lean on L1's decimal
      memory FYI for sizing.
    inputs:
      - "vInfo[Memory]"
    output:
      engine_field: "rs_mem_gib (binary), price_query_mem_gb (decimal)"
      excel_cell: "n/a"
    fallbacks: []
    citations:
      - source: "BA Layer 2 transcript"
        timestamp: "00:03:00"
        excerpt: "I've had to convert from MIB for memory to gigabytes decibel. And that conversion needs to be done before you do the Azure Retail Price API lookup."
    reference_expected: null
    engine_status: PARTIAL
    engine_status_note: "Engine converts but uses inconsistent /1024 across the board; needs explicit dual-conversion."
    reviewed: true

# =============================================================================
# Section B — RIGHTSIZING (R&D-sanctioned, dual-cited)
# =============================================================================

  - rule_id: L2.RIGHTSIZE.CPU.001
    topic: "CPU rightsizing per R&D.SLIDE7 with strategy-driven branch selection"
    ba_action: |
      Apply the R&D-sanctioned CPU rightsizing formula PER VM. Branch
      selection is driven by KP.STRATEGY_PRECEDENCE:

        strategy == 'per_vm_telemetry':
          For each VM with non-null cpu_util_pct (from vCPU tab or vInfo
          embedded), substitute that into R&D.SLIDE7.CPU.USER as the
          (1 - cpu_reduction_pct/100) factor (i.e. retained% = util%).

        strategy == 'host_proxy':   (opt-in only per KP.HOSTPROXY_GATE)
          rs_vcpus = snapCPU( max( min_vcpus,
                                    ceil( vInfo[CPUs]
                                           × max(vHost[CPU Usage %], 1)/100 ) ) )
          (R&D.SLIDE7.CPU.DEFAULT verbatim)

        strategy == 'flat_reduction':
          rs_vcpus = snapCPU( max( min_vcpus,
                                    ceil( vInfo[CPUs]
                                           × (1 − cpu_reduction_pct/100) ) ) )
          (R&D.SLIDE7.CPU.USER with BA-supplied cpu_reduction_pct)

        strategy == 'like_for_like':
          rs_vcpus = snapCPU( max( min_vcpus, vInfo[CPUs] ) )
          (Equivalent to R&D.SLIDE7.CPU.USER with cpu_reduction_pct = 0.
           Snap-only; no reduction applied. Customer A reference baseline used
           this strategy.)

        strategy == 'ba_fallback':
          rs_vcpus = snapCPU( max( min_vcpus,
                                    ceil( vInfo[CPUs] × 0.40 ) ) )
          (R&D.SLIDE7.CPU.USER with cpu_reduction_pct = 60 per
           KP.BA_FALLBACK_REDUCTIONS. BA-editable.)

      `min_vcpus` resolved per-VM via KP.WIN_8VCPU_MIN.
      `snapCPU` ladder per R&D.SLIDE7.SNAPCPU.
