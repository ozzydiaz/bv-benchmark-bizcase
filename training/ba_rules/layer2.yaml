# =============================================================================
# Section C — SKU MATCHING (least-cost selection)
# =============================================================================

  - rule_id: L2.MATCH.001
    topic: "SKU candidate set is the least-cost match across the Azure Retail Price API"
    ba_action: |
      For each VM, query the Azure Retail Price API for SKUs that satisfy:
        sku.vcpu      >= rs_vcpus
        sku.memory_gib >= rs_mem_gib
        sku.region     == VM.azure_region
      Apply optional family / processor pin (R&D.OPTIONAL.FAMILY_PROCESSOR
      slide 5) when supplied. Pick the SKU with the lowest PAYG hourly
      price. The XA2 Excel add-in does this automatically; the engine and
      replica reproduce the logic.
    inputs:
      - "rs_vcpus, rs_mem_gib (from L2.RIGHTSIZE.*)"
      - "VMRecord.azure_region"
      - "ba_review_packet.family_pin, processor_pin"
    output:
      engine_field: "per_vm_l2[].sku_name, .sku_vcpu, .sku_memory_gib, .sku_payg_usd_hr"
      excel_cell: "n/a"
    fallbacks:
      - condition: "No SKU satisfies the constraints"
        action: "BA workflow per L2.RIGHTSIZE.CPU.RETRY — increment vCPU by 1 until a match is found, capping at the snapCPU ladder."
    citations:
      - source: "BA Layer 2 transcript"
        timestamp: "00:02:34"
        excerpt: "we use an Excel add-in, Microsoft Excel add-in called XA2. ... you won't have access to that, so you'll have to build in the logic yourself or review the existing logic and potentially refactor it."
      - source: "BA Layer 2 transcript"
        timestamp: "00:03:48"
        excerpt: "For whatever number of Azure VM SKUs come back, pick the least cost"
    reference_expected: null
    engine_status: PARTIAL
    engine_status_note: "engine/azure_sku_matcher.py implements least-cost matching but ignores family/processor pin and uses hard min_vcpu=8 (per L2.RIGHTSIZE.CPU.WINDOWS_FLOOR carve-out)."
    reviewed: true

  - rule_id: L2.RIGHTSIZE.CPU.RETRY
    topic: "Match-error retry: BA decrements then increments vCPU to find the first viable SKU"
    ba_action: |
      When the initial rs_vcpus value yields no SKU match (XA2 returns
      #VALUE!), the BA's manual technique is:
        a) DECREMENT by 1 vCPU at a time until a match is found, capping at
           min_vcpus (KP.WIN_8VCPU_MIN). Annotated GREEN in BA spreadsheets.
        b) If decrement reaches min_vcpus with no match, INCREMENT by 1
           memory GiB at a time (rare; cheaper Azure SKUs don't always
           offer the exact memory tier). Annotated YELLOW.
      Goal: the cheapest SKU close to but ≥ source vCPU/memory, never
      over-inflating the price for the sake of getting a match.
    inputs:
      - "rs_vcpus (initial), rs_mem_gib"
    output:
      engine_field: "per_vm_l2[].adjustment = {vcpu_delta, mem_delta_gib, retry_iterations}"
      excel_cell: "n/a"
    fallbacks:
      - condition: "Hit min_vcpus AND ladder maxes out on memory increments"
        action: "Last-resort: pick the absolute cheapest SKU in the region; record retry_failed=True and surface per-VM."
    citations:
      - source: "BA Layer 2 transcript"
        timestamp: "00:06:10"
        excerpt: "I adjusted them down, basically one by one, one vCPU at a time until I got a successful match for a least cost Azure virtual machine"
      - source: "BA Layer 2 transcript"
        timestamp: "00:13:00"
        excerpt: "I'm going to start incrementing up. By one, and I did, and then you see a successful Match there through the Azure Retail Price API."
      - source: "BA Layer 2 transcript"
        timestamp: "00:08:46"
        excerpt: "We try to do that as close to what the customer's original counts are, but we're also trying to optimize price ... we cannot over-inflate the monthly or annual Azure consumption pricing for a VM just to get a match"
    source_conflict: null
    reference_expected: null
    engine_status: UNIMPLEMENTED
    engine_status_note: "Engine picks first SKU that satisfies constraints but does not iterate when no match exists."
    reviewed: true

