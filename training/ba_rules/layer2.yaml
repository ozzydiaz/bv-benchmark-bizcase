# =============================================================================
# Section G — HANDOFF TO LAYER 3
# =============================================================================

  - rule_id: L2.HANDOFF.001
    topic: "Layer 2 emits per_vm_l2[] + pricing aggregates"
    ba_action: |
      Layer 2's output is the input to Layer 3. Required content:

        per_vm_l2[]:                              # per KP.PER_VM_REPRISE
          - name (joined to L1 per_vm[].name)
          - rs_vcpus, rs_mem_gib, rs_disk_gib    # rightsized triple
          - cpu_branch, memory_branch, storage_branch  # which formula was used
          - cpu_floor_source                     # 'windows_compliance' | 'linux' | 'flag_off'
          - sku_name, sku_vcpu, sku_memory_gib   # matched SKU
          - family, processor, azure_region
          - disk_layout = [(tier, count, gib_each)]
          - pricing = {payg, ri1y, ri3y, sp1y, sp3y}  # each {usd_yr, available}
          - storage_pricing = list[per-disk PAYG annual]
          - sku_alternates[] (when L2.PRICING.002 surfaced any)
          - retry_iterations, retry_failed       # from L2.RIGHTSIZE.CPU.RETRY

        fyi_aggregates:
          - sum_rs_vcpus, sum_rs_mem_gib, sum_rs_disk_gib
          - azure_payg_usd_yr (headline)
          - azure_ri1y_usd_yr, ri3y, sp1y, sp3y_usd_yr
          - storage_payg_usd_yr
          - vms_matched, vms_with_retry, vms_match_failed

        ba_review_packet (L2 additions):
          - utilisation_strategy_used
          - reduction_pcts_used (cpu, mem, mem_buffer, storage, storage_buffer)
          - missing_pricing_offers (list per offer code)
          - sku_alternate_decisions[]
