  - rule_id: L2.RIGHTSIZE.STORAGE.001
    topic: "Storage rightsizing per R&D.SLIDE9 — three-tier source chain + strategy"
    ba_action: |
      Apply the R&D three-tier source chain PER VM. Strategy adjusts which
      reduction/buffer values feed the formulas:

        Source-tier selection (ALWAYS, regardless of strategy):
          Tier 1 — vPartition present, Σ Consumed MiB > 0
          Tier 2 — vPartition present, Σ Consumed = 0/null
          Tier 3 — vPartition absent (use vInfo[Total disk capacity MiB])

        strategy == 'per_vm_telemetry' OR 'like_for_like':
          Tier 1: R&D.SLIDE9.STORAGE.DEFAULT (Consumed-based, buffer=0)
          Tier 2/3: R&D.SLIDE9.STORAGE.CAPACITY/.VINFO with reduction=0,
                    buffer=0 (effectively size to provisioned capacity)

        strategy == 'flat_reduction':
          All tiers: R&D.SLIDE9.* with BA-supplied storage_reduction_pct
          and storage_buffer_pct.

        strategy == 'ba_fallback':
          Tier 2/3: R&D.SLIDE9.STORAGE.CAPACITY/.VINFO with
                    storage_reduction_pct = 20 per KP.BA_FALLBACK_REDUCTIONS
                    (retained = 80%), buffer = 0. BA-editable.
          Tier 1: same as per_vm_telemetry (consumed already reflects reality).

      All branches snap UP to nearest 128 GiB (P10 minimum) and floor at
      128 GiB. Each branch recorded per-VM as `storage_branch` (one of:
      'default', 'capacity', 'vinfo'). `storage_strategy` records which
      strategy parameters were applied.
