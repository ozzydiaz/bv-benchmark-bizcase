# Right-sizing parameters
# Per-VM rightsizing hierarchy (CPU and memory):
#   1. vCPU / vMemory tab — per-VM utilisation ratio (Overall/Max or Consumed/Size)
#   2. vHost tab — host CPU usage % / Memory usage % as proxy for all VMs on that host
#   3. No telemetry → cpu_util_fallback_factor / mem_util_fallback_factor applied
# Headroom factors are added on top of the utilised fraction in all cases.
#
# Storage hierarchy per VM:
#   1. vDisk tab — Capacity MiB per disk (provisioned, most accurate for tier assignment)
#   2. vPartition tab — Consumed MiB per partition, summed per VM
#   3. vInfo — In Use MiB
#   4. vInfo — Provisioned MiB × (1 - storage_prov_reduction_factor)
cpu_rightsizing_headroom_factor:
  default: 0.20
  survey_backup: 0.20
memory_rightsizing_headroom_factor:
  default: 0.20
  survey_backup: 0.20
cpu_util_fallback_factor:
  default: 0.40
  survey_backup: 0.40
mem_util_fallback_factor:
  default: 0.60
  survey_backup: 0.60
storage_prov_reduction_factor:
  default: 0.20
  survey_backup: 0.20
utilization_percentile:
  default: 95
